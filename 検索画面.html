const norm = s => (s==null?"":String(s)).toLowerCase()
  .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
  .replace(/[＃♯]/g,"#").replace(/[‐－―ー−]/g,"-");

// 検索用テキストを事前作成
DATA.requests.forEach(r=>{
  r._t = norm(["#"+r.request_no, r.request_no, r.seiban, r.hinmei, r.yoto, r.kiji,
               r.dest, r.spec, r.biko, r.prev, r.noki, r.noki_raw].join(" "));
});
DATA.boms.forEach(b=>{
  b._t = norm([b.product_code, b.seiban, b.ref_requests.map(x=>"#"+x).join(" "),
               b.ref_requests.join(" "),
               b.components.map(c=>c.role+" "+c.part_no+" "+c.note).join(" "), b.file].join(" "));
});

const esc = s => (s==null?"":String(s)).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function hl(s, toks){
  let e = esc(s); if(!s) return "";
  toks.forEach(t=>{ if(t.length<2) return;
    try{ e = e.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"), m=>"<mark>"+m+"</mark>"); }catch(_){}
  });
  return e;
}
function openPrev(idx, kind){
  const x = kind==='b' ? DATA.boms[idx] : DATA.requests[idx];
  const box = document.getElementById("mimg");
  box.innerHTML = x.previews.length
    ? x.previews.map(p=>"<img src='"+encodeURI(p)+"'>").join("")
    : "<div style='color:#fff;padding:40px'>プレビューがありません（取り込みを再実行してください）</div>";
  document.getElementById("mtitle").textContent = x.file;
  document.getElementById("mopen").href = encodeURI(x.file);
  document.getElementById("modal").classList.add("on");
}
function closePrev(){ document.getElementById("modal").classList.remove("on"); }
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closePrev(); });
const row = (k,v)=> v ? "<tr><th>"+k+"</th><td>"+v+"</td></tr>" : "";
const chip = t => "<span class='chip' onclick=\"go('"+t.replace(/'/g,"")+"')\">"+esc(t)+"</span>";
function go(t){ document.getElementById("q").value = t; render(); }

function cardIrai(r, toks){
  const idx = DATA.requests.indexOf(r);
  return "<div class='card'><h3><span class='tag t-irai'>加工依頼書</span>#"+r.request_no+
    (r.seiban?" <span class='tag t-seiban'>製番 "+esc(r.seiban)+"</span>":"")+
    " "+hl(r.hinmei,toks)+"</h3><table>"+
    row("発行日", esc(r.issue_date))+row("数量", esc(r.qty))+row("生地色", hl(r.kiji,toks))+
    row("用途", hl(r.yoto,toks))+row("納期", esc(r.noki||r.noki_raw))+row("出荷先", hl(r.dest,toks))+
    row("規格", hl(r.spec,toks))+row("備考", hl(r.biko,toks))+row("前回", hl(r.prev,toks))+
    "</table><div class='file'><button class='pv' onclick='openPrev("+idx+",\"r\")'>&#128269; プレビュー</button>📄 <a href='"+encodeURI(r.file)+"'>"+esc(r.file)+"</a></div></div>";
}
function cardBom(b, toks){
  const idx = DATA.boms.indexOf(b);
  const comps = b.components.map(c=>
    "<tr><td>"+hl(c.role,toks)+"</td><td>"+ (c.part_no?chip(c.part_no):"") +"</td><td>"+hl(c.note,toks)+"</td></tr>").join("");
  return "<div class='card'><h3><span class='tag t-bom'>BOM</span>"+chip(b.product_code)+
    (b.seiban?" <span class='tag t-seiban'>製番 "+esc(b.seiban)+"</span>":"")+
    (b.layout_ok?"":" <span class='tag t-warn'>例外レイアウト・要確認</span>")+"</h3>"+
    (b.ref_requests.length?"<div style='margin:4px 0'>関連依頼: "+b.ref_requests.map(x=>chip("#"+x)).join("")+"</div>":"")+
    "<table><tr><th style='width:110px'>役割</th><th style='width:200px'>部品番号</th><th>仕様メモ</th></tr>"+comps+
    "</table><div class='file'><button class='pv' onclick='openPrev("+idx+",\"b\")'>&#128269; プレビュー</button>📄 <a href='"+encodeURI(b.file)+"'>"+esc(b.file)+"</a></div></div>";
}

function render(){
  const q = norm(document.getElementById("q").value.trim());
  const toks = q ? q.split(/\s+/) : [];
  const hit = x => toks.every(t=>x._t.includes(t));
  const rs = DATA.requests.filter(hit), bs = DATA.boms.filter(hit);
  document.getElementById("cnt").textContent =
    "加工依頼書 "+rs.length+"件 / BOM "+bs.length+"件";
  const rawToks = document.getElementById("q").value.trim().split(/\s+/).filter(Boolean);
  document.getElementById("out").innerHTML =
    (rs.length+bs.length===0) ? "<div class='none'>該当なし</div>" :
    bs.map(b=>cardBom(b,rawToks)).join("") + rs.map(r=>cardIrai(r,rawToks)).join("");
}
document.getElementById("q").addEventListener("input", render);
render();
</script>
